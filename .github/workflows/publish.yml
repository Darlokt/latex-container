name: Build and publish image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Immutable image tag (for example tl2026-snapshot-20260721)"
        required: true
        type: string
      update_stable_aliases:
        description: "Also update tl2026 and latest"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare publication
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    outputs:
      build_date: ${{ steps.meta.outputs.build_date }}
      image: ${{ steps.meta.outputs.image }}
      immutable_tag: ${{ steps.meta.outputs.immutable_tag }}
      snapshot: ${{ steps.meta.outputs.snapshot }}
      tags: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Validate Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml

      - name: Validate repository and workflows
        run: |
          shellcheck scripts/* tests/smoke/* .github/scripts/*.sh
          .github/scripts/validate-repository.sh
          docker build --check .
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Set up Node.js for repository linting
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          cache: npm

      - name: Lint Markdown
        run: |
          npm install --global npm@12.0.1
          npm ci --ignore-scripts
          npx markdownlint --ignore node_modules '**/*.md'

      - name: Compute tags and build metadata
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REVISION: ${{ github.sha }}
          UPDATE_STABLE_ALIASES: ${{ inputs.update_stable_aliases }}
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if [[ "${EVENT_NAME}" == release ]]; then
            immutable_tag="${RELEASE_TAG}"
            if [[ ! "${immutable_tag}" =~ ^tl2026-debian13-r[0-9]+$ ]]; then
              echo "Release tag must match tl2026-debian13-rN: ${immutable_tag}" >&2
              exit 1
            fi
            tags="${image}:${immutable_tag},${image}:tl2026,${image}:latest"
          else
            immutable_tag="${MANUAL_TAG}"
            if [[ ! "${immutable_tag}" =~ ^[a-z0-9][a-z0-9._-]*$ ]]; then
              echo "Manual tag is not a valid lowercase container tag: ${immutable_tag}" >&2
              exit 1
            fi
            tags="${image}:${immutable_tag},${image}:edge"
            if [[ "${UPDATE_STABLE_ALIASES}" == true ]]; then
              tags="${tags},${image}:tl2026,${image}:latest"
            fi
          fi
          version="${immutable_tag}"
          snapshot="$(date -u +%Y-%m-%d)"

          {
            echo "build_date=${build_date}"
            echo "image=${image}"
            echo "immutable_tag=${immutable_tag}"
            echo "snapshot=${snapshot}"
            echo "tags=${tags}"
            echo "version=${version}"
          } >> "${GITHUB_OUTPUT}"

      - name: Refuse to overwrite immutable tag
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          IMMUTABLE_TAG: ${{ steps.meta.outputs.immutable_tag }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin
          if docker manifest inspect "${IMAGE}:${IMMUTABLE_TAG}" >/dev/null 2>&1; then
            echo "Immutable tag already exists: ${IMAGE}:${IMMUTABLE_TAG}" >&2
            exit 1
          fi

  build:
    name: Build and test ${{ matrix.arch }}
    needs: prepare
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build smoke-test stage
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          build-args: |
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            TEXLIVE_SNAPSHOT=${{ needs.prepare.outputs.snapshot }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ needs.prepare.outputs.version }}
          cache-from: type=registry,ref=${{ needs.prepare.outputs.image }}:buildcache-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ needs.prepare.outputs.image }}:buildcache-${{ matrix.arch }},mode=max
          context: .
          platforms: ${{ matrix.platform }}
          provenance: false
          push: false
          sbom: false
          target: test

      - name: Push runtime by digest
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          build-args: |
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            TEXLIVE_SNAPSHOT=${{ needs.prepare.outputs.snapshot }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ needs.prepare.outputs.version }}
          cache-from: type=registry,ref=${{ needs.prepare.outputs.image }}:buildcache-${{ matrix.arch }}
          context: .
          labels: |
            org.opencontainers.image.created=${{ needs.prepare.outputs.build_date }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}#readme
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
          outputs: type=image,name=${{ needs.prepare.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false
          target: final

      - name: Export digest
        shell: bash
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          touch "${RUNNER_TEMP}/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Publish multi-platform manifest
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      digest: ${{ steps.manifest.outputs.digest }}
      image: ${{ needs.prepare.outputs.image }}
    steps:
      - name: Download architecture digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Create manifest and tags
        id: manifest
        shell: bash
        env:
          DIGEST_DIR: ${{ runner.temp }}/digests
          IMAGE: ${{ needs.prepare.outputs.image }}
          TAGS: ${{ needs.prepare.outputs.tags }}
        run: |
          set -euo pipefail
          tag_args=()
          IFS=',' read -ra tag_list <<< "${TAGS}"
          for tag in "${tag_list[@]}"; do
            tag_args+=(--tag "${tag}")
          done

          sources=()
          while IFS= read -r digest_file; do
            sources+=("${IMAGE}@sha256:${digest_file##*/}")
          done < <(find "${DIGEST_DIR}" -type f | sort)

          if ((${#sources[@]} != 2)); then
            echo "Expected two architecture digests, found ${#sources[@]}" >&2
            exit 1
          fi

          docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"
          first_tag="${tag_list[0]}"
          digest="$(docker buildx imagetools inspect "${first_tag}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"
          docker buildx imagetools inspect "${first_tag}"

      - name: Generate signed build provenance attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ needs.prepare.outputs.image }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true
          create-storage-record: false
